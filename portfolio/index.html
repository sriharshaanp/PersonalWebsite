<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal Portfolio</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>My Portfolio</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#memberships">Memberships</a>
      <a href="#judging">Judging</a>
      <a href="#publications">Publications</a>
      <a href="#media">Media</a>
    </nav>
  </header>

  <main>
    <section id="about" class="panel">
      <h2>About</h2>
      <p id="about-text">Hello — I am a researcher and media artist. Customize this text in <code>js/app.js</code>.</p>
    </section>

    <section id="memberships" class="panel">
      <h2>Memberships</h2>
      <div id="memberships-grid" class="grid"></div>
    </section>

    <section id="judging" class="panel">
      <h2>Judging</h2>
      <div id="judging-grid" class="grid"></div>
    </section>

    <section id="publications" class="panel">
      <h2>Publications</h2>
      <ul id="publications-list"></ul>
    </section>

    <section id="media" class="panel">
      <h2>Media Articles</h2>
      <ul id="media-list"></ul>
    </section>
  </main>

  <footer class="site-footer">© <span id="year"></span></footer>

  <!-- Modal for judging details -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
