name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [ main ]

# Grant explicit permissions needed to publish Pages
permissions:
  contents: read
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci || npm install
        working-directory: ./portfolio

      - name: Build portfolio
        run: npm run build
        working-directory: ./portfolio

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Prefer a user-provided PAT stored in repo secret `DEPLOY_TOKEN`, otherwise fall back to the built-in GITHUB_TOKEN
          github_token: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          publish_dir: ./portfolio/dist
